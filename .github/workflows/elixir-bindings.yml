name: Elixir Bindings

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  elixir-open:
    name: elixir-open (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    defaults:
      run:
        working-directory: bindings/elixir-open

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup BEAM
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.0"
          otp-version: "28.0"

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Install Elixir deps
        run: mix deps.get

      - name: Test elixir-open
        env:
          MIX_ENV: test
        run: mix test
